<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us | NexStep Educations</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <style>
        .contact-section {
            padding: 100px 0;
        }

        .contact-card {
            background: #111827;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, .08);
            max-width: 800px;
            margin: auto;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .contact-form input,
        .contact-form textarea {
            background: #0B1120;
            border: 1px solid rgba(255, 255, 255, .1);
            padding: 16px;
            border-radius: 12px;
            color: white;
            font-family: inherit;
        }

        .contact-form textarea {
            height: 180px;
            resize: none;
        }

        .contact-form button {
            border: none;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <nav class="navbar">
        <div class="container nav-container">

            <a href="index.html" class="logo">
                <img src="/assets/logo.png" alt="NexStep Educations Logo" class="logo-image">
            </a>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>

            <a href="#" class="btn-primary">Apply Now</a>

        </div>
    </nav>

    <section class="hero">
        <div class="container">

            <div class="hero-content">

                <span class="tag">Get In Touch</span>

                <h1>Let's Discuss Your Educational Goals</h1>

                <p>
                    Our advisors are ready to help you find the right program.
                </p>

            </div>

        </div>
    </section>

    <section class="contact-section">

        <div class="container">

            <div class="contact-card">

                <form class="contact-form">

                    <input type="text" placeholder="Your Name" required>

                    <input type="email" placeholder="Email Address" required>

                    <input type="tel" placeholder="Phone Number" required>

                    <textarea placeholder="Your Message"></textarea>

                    <button type="submit" class="btn-primary">
                        Send Inquiry
                    </button>

                </form>

            </div>

        </div>

    </section>

    <footer>
        <div class="container footer-content">

            <div>
                <h3>NexStep Educations</h3>
                <p>nexstepeducations.com</p>
            </div>

            <p>© 2026 NexStep Educations</p>

        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
